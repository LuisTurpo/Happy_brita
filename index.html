<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Yulis!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>¡Feliz Cumpleaños!</h1>
        <div class="birthday-girl">Yulis</div>
        
        <div class="message">
            <p>¡Que este día esté lleno de alegría, sorpresas y momentos especiales!</p>
            <p>Eres una persona increíble y mereces lo mejor. ¡Disfruta tu día al máximo!</p>
        </div>
        
        <div class="cake-container">
            <div class="cake">
                <div class="candle">
                    <div class="flame"></div>
                </div>
            </div>
        </div>
        
        <div class="balloons">
            <div class="balloon balloon1"></div>
            <div class="balloon balloon2"></div>
            <div class="balloon balloon3"></div>
            <div class="balloon balloon4"></div>
        </div>
        
        <button id="surpriseBtn" class="surprise-btn">¡Haz clic para una sorpresa!</button>
        
        <div class="confetti-container"></div>
        
        <div id="photoFrame" class="photo-frame hidden">
            <div class="frame-content">
                <h2>¡Una foto especial para ti!</h2>
                <div class="photo-placeholder">
                    <p>Aquí iría una foto tuya llena de alegría</p>
                </div>
                <button id="closeFrame" class="close-btn">Cerrar</button>
            </div>
        </div>
        
        <div class="footer">
            <p>Con cariño en tu día especial ❤️</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
